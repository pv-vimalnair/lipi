  #         security create-keychain -p "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" $KEYCHAIN_PATH
  #         security set-default-keychain -s $KEYCHAIN_PATH
  #         security unlock-keychain -p "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" $KEYCHAIN_PATH
  #         security import /tmp/cert.p12 -k $KEYCHAIN_PATH \
  #           -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
  #           -T /usr/bin/codesign
  #         security set-key-partition-list -S apple-tool:,apple: -k "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" $KEYCHAIN_PATH
  #
  #     - name: Install provisioning profile
  #       run: |
  #         mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
  #         echo "${{ secrets.APPLE_PROVISIONING_PROFILE }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/lipi.mobileprovision
